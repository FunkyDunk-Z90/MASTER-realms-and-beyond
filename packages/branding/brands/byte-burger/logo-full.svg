<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90">
  <rect width="400" height="90" fill="#0E0B08"/>

  <!-- Pixel burger icon (compact, left) -->
  <!-- Top bun -->
  <rect x="14" y="8"  width="14" height="2"  fill="#D46010"/>
  <rect x="10" y="10" width="22" height="2"  fill="#D46010"/>
  <rect x="8"  y="12" width="26" height="3"  fill="#D46010"/>
  <!-- Seeds -->
  <rect x="11" y="9"  width="3" height="1"   fill="#D4A818"/>
  <rect x="18" y="9"  width="3" height="1"   fill="#D4A818"/>
  <rect x="25" y="9"  width="2" height="1"   fill="#D4A818"/>
  <!-- Lettuce -->
  <rect x="6"  y="15" width="30" height="3"  fill="#4a7a28"/>
  <!-- Cheese -->
  <rect x="6"  y="18" width="30" height="3"  fill="#D4A818"/>
  <!-- Patty -->
  <rect x="8"  y="21" width="26" height="7"  fill="#4a2010"/>
  <rect x="10" y="23" width="22" height="1"  fill="#2a1008" opacity="0.55"/>
  <rect x="10" y="25" width="22" height="1"  fill="#2a1008" opacity="0.55"/>
  <!-- Bottom bun -->
  <rect x="8"  y="28" width="26" height="3"  fill="#D46010"/>
  <rect x="10" y="31" width="22" height="3"  fill="#c05a0a"/>
  <rect x="14" y="34" width="14" height="2"  fill="#c05a0a"/>

  <!-- Vertical divider -->
  <line x1="50" y1="10" x2="50" y2="80" stroke="#D46010" stroke-width="1" opacity="0.28"/>

  <!-- Wordmark — stacked BYTE / BURGER -->
  <text x="64" y="38" font-family="Share Tech Mono, Courier New, monospace"
        font-size="24" font-weight="700" fill="#D46010" letter-spacing="2">BYTE</text>
  <text x="64" y="64" font-family="Share Tech Mono, Courier New, monospace"
        font-size="24" font-weight="700" fill="#D4A818" letter-spacing="0.5">BURGER</text>

  <!-- Sub-text -->
  <text x="64" y="78" font-family="Barlow Condensed, Arial Narrow, sans-serif"
        font-size="8.5" font-weight="400" fill="#D46010" letter-spacing="3.5" opacity="0.62">EST. 2087  ·  LEVEL UP YOUR LUNCH</text>
</svg>
