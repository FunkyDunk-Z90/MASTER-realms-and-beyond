<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0E0B08"/>

  <defs>
    <!-- Scanline texture simulation (subtle horizontal rules) -->
    <pattern id="bb-scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="1" fill="#D46010" opacity="0.025"/>
    </pattern>
    <radialGradient id="bb-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#D46010" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0E0B08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bb-glow)"/>
  <rect width="1200" height="630" fill="url(#bb-scanlines)"/>

  <!-- Decorative pixel grid dots (retro arcade background) -->
  <g opacity="0.06" fill="#D46010">
    <rect x="60"  y="60"  width="4" height="4"/>
    <rect x="120" y="60"  width="4" height="4"/>
    <rect x="180" y="60"  width="4" height="4"/>
    <rect x="240" y="60"  width="4" height="4"/>
    <rect x="300" y="60"  width="4" height="4"/>
    <rect x="360" y="60"  width="4" height="4"/>
    <rect x="420" y="60"  width="4" height="4"/>
    <rect x="480" y="60"  width="4" height="4"/>
    <rect x="540" y="60"  width="4" height="4"/>
    <rect x="600" y="60"  width="4" height="4"/>
    <rect x="660" y="60"  width="4" height="4"/>
    <rect x="720" y="60"  width="4" height="4"/>
    <rect x="780" y="60"  width="4" height="4"/>
    <rect x="840" y="60"  width="4" height="4"/>
    <rect x="900" y="60"  width="4" height="4"/>
    <rect x="960" y="60"  width="4" height="4"/>
    <rect x="1020" y="60" width="4" height="4"/>
    <rect x="1080" y="60" width="4" height="4"/>
    <rect x="1140" y="60" width="4" height="4"/>
    <rect x="60"  y="120" width="4" height="4"/>
    <rect x="1140" y="120" width="4" height="4"/>
    <rect x="60"  y="510" width="4" height="4"/>
    <rect x="1140" y="510" width="4" height="4"/>
    <rect x="60"  y="570" width="4" height="4"/>
    <rect x="120" y="570" width="4" height="4"/>
    <rect x="180" y="570" width="4" height="4"/>
    <rect x="240" y="570" width="4" height="4"/>
    <rect x="300" y="570" width="4" height="4"/>
    <rect x="360" y="570" width="4" height="4"/>
    <rect x="420" y="570" width="4" height="4"/>
    <rect x="480" y="570" width="4" height="4"/>
    <rect x="540" y="570" width="4" height="4"/>
    <rect x="600" y="570" width="4" height="4"/>
    <rect x="660" y="570" width="4" height="4"/>
    <rect x="720" y="570" width="4" height="4"/>
    <rect x="780" y="570" width="4" height="4"/>
    <rect x="840" y="570" width="4" height="4"/>
    <rect x="900" y="570" width="4" height="4"/>
    <rect x="960" y="570" width="4" height="4"/>
    <rect x="1020" y="570" width="4" height="4"/>
    <rect x="1080" y="570" width="4" height="4"/>
    <rect x="1140" y="570" width="4" height="4"/>
  </g>

  <!-- Large pixel burger (centered, background decoration) -->
  <g transform="translate(490, 60)" opacity="0.08">
    <rect x="60"  y="0"   width="100" height="14" fill="#D46010"/>
    <rect x="30"  y="14"  width="160" height="14" fill="#D46010"/>
    <rect x="0"   y="28"  width="220" height="18" fill="#D46010"/>
    <rect x="0"   y="46"  width="220" height="18" fill="#4a7a28"/>
    <rect x="0"   y="64"  width="220" height="18" fill="#D4A818"/>
    <rect x="0"   y="82"  width="220" height="48" fill="#4a2010"/>
    <rect x="0"   y="130" width="220" height="20" fill="#D46010"/>
    <rect x="20"  y="150" width="180" height="20" fill="#c05a0a"/>
    <rect x="60"  y="170" width="100" height="14" fill="#c05a0a"/>
  </g>

  <!-- HUD bar at top -->
  <rect x="0" y="0" width="1200" height="56" fill="#D46010" opacity="0.1"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#D46010" stroke-width="1.5" opacity="0.35"/>
  <text x="60"  y="36" font-family="Share Tech Mono, Courier New, monospace"
        font-size="14" fill="#D46010" letter-spacing="2" opacity="0.7">HI-SCORE: 999999</text>
  <text x="1140" y="36" text-anchor="end"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="14" fill="#D4A818" letter-spacing="2" opacity="0.7">LIVES: ♥ ♥ ♥</text>
  <text x="600" y="36" text-anchor="middle"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="14" fill="#F5E8C0" letter-spacing="3" opacity="0.55">BYTEBURGER OS  v2.087</text>

  <!-- Horizontal rules around title -->
  <line x1="60"  y1="290" x2="1140" y2="290" stroke="#D46010" stroke-width="1.5" opacity="0.28"/>

  <!-- Main title (pixel-chunky via letter-spacing) -->
  <text x="600" y="388" text-anchor="middle"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="88" font-weight="700" fill="#D46010" letter-spacing="4">BYTE</text>

  <!-- BURGER offset slightly -->
  <text x="600" y="468" text-anchor="middle"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="88" font-weight="700" fill="#D4A818" letter-spacing="2">BURGER</text>

  <line x1="60"  y1="488" x2="1140" y2="488" stroke="#D46010" stroke-width="1.5" opacity="0.28"/>

  <!-- Taglines -->
  <text x="600" y="528" text-anchor="middle"
        font-family="Barlow Condensed, Arial Narrow, sans-serif"
        font-size="22" fill="#F5E8C0" letter-spacing="8" opacity="0.75">LEVEL UP YOUR LUNCH  ·  INSERT COIN TO EAT  ·  EST. 2087</text>

  <!-- Footer -->
  <rect x="0" y="598" width="1200" height="32" fill="#D46010" opacity="0.08"/>
  <line x1="0" y1="598" x2="1200" y2="598" stroke="#D46010" stroke-width="1" opacity="0.25"/>
  <text x="600" y="618" text-anchor="middle"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="11" fill="#D46010" letter-spacing="2" opacity="0.45">byteburger.realms-and-beyond.com</text>
</svg>
