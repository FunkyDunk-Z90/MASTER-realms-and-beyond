<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0E0B08"/>

  <!-- Top bun dome (pixel-blocky layers) -->
  <rect x="22" y="10" width="20" height="3"  fill="#D46010"/>
  <rect x="16" y="13" width="32" height="3"  fill="#D46010"/>
  <rect x="10" y="16" width="44" height="4"  fill="#D46010"/>

  <!-- Sesame seeds -->
  <rect x="18" y="12" width="5"  height="2" rx="1" fill="#D4A818" opacity="0.9"/>
  <rect x="30" y="11" width="5"  height="2" rx="1" fill="#D4A818" opacity="0.9"/>
  <rect x="42" y="12" width="4"  height="2" rx="1" fill="#D4A818" opacity="0.9"/>

  <!-- Lettuce -->
  <rect x="8"  y="20" width="48" height="4" fill="#4a7a28"/>
  <!-- Lettuce frilly edges -->
  <rect x="6"  y="21" width="4"  height="2" fill="#4a7a28"/>
  <rect x="54" y="21" width="4"  height="2" fill="#4a7a28"/>
  <rect x="12" y="20" width="2"  height="2" fill="#5a8a30"/>
  <rect x="24" y="20" width="2"  height="2" fill="#5a8a30"/>
  <rect x="36" y="20" width="2"  height="2" fill="#5a8a30"/>
  <rect x="48" y="20" width="2"  height="2" fill="#5a8a30"/>

  <!-- Cheese -->
  <rect x="8"  y="24" width="48" height="4" fill="#D4A818"/>

  <!-- Patty -->
  <rect x="10" y="28" width="44" height="10" fill="#4a2010"/>
  <!-- Patty grill marks -->
  <rect x="14" y="30" width="36" height="1"  fill="#2a1008" opacity="0.55"/>
  <rect x="14" y="33" width="36" height="1"  fill="#2a1008" opacity="0.55"/>

  <!-- Bottom bun -->
  <rect x="10" y="38" width="44" height="5" fill="#D46010"/>
  <rect x="14" y="43" width="36" height="4" fill="#c05a0a"/>
  <rect x="20" y="47" width="24" height="3" fill="#c05a0a"/>
</svg>
