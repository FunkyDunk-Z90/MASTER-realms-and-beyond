<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="4" fill="#262425"/>

  <!-- Arcane outer ring -->
  <circle cx="32" cy="31" r="22" fill="none" stroke="#8c9657" stroke-width="1.2" opacity="0.42"/>

  <!-- Cardinal rune tick marks -->
  <line x1="32" y1="9"  x2="32" y2="13" stroke="#8c9657" stroke-width="1.5" opacity="0.5"/>
  <line x1="54" y1="31" x2="50" y2="31" stroke="#8c9657" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="53" x2="32" y2="49" stroke="#8c9657" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="31" x2="14" y2="31" stroke="#8c9657" stroke-width="1.5" opacity="0.5"/>

  <!-- Quill spine — diagonal top-right to bottom-left -->
  <path d="M46 11 C50 15 43 29 33 40 C27 46 21 51 19 54"
        fill="none" stroke="#8c9657" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Feather barbs — left side of spine -->
  <path d="M44 15 C39 17 35 23 33 29" fill="none" stroke="#8c9657" stroke-width="1.1" opacity="0.5"/>
  <path d="M42 19 C37 21 33 27 31 33" fill="none" stroke="#8c9657" stroke-width="1.1" opacity="0.44"/>
  <path d="M40 23 C35 25 31 31 29 37" fill="none" stroke="#8c9657" stroke-width="1.1" opacity="0.38"/>

  <!-- Feather barbs — right side of spine -->
  <path d="M46 15 C48 20 45 26 39 32" fill="none" stroke="#8c9657" stroke-width="1.1" opacity="0.44"/>
  <path d="M44 19 C46 24 43 30 37 36" fill="none" stroke="#8c9657" stroke-width="1.1" opacity="0.38"/>

  <!-- Ink nib tip -->
  <circle cx="19" cy="54" r="3"   fill="#a87a3a"/>
  <circle cx="19" cy="54" r="1.5" fill="#c8922e"/>
</svg>
