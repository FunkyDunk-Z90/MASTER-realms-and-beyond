<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#262425"/>

  <defs>
    <!-- Amethyst mist glow -->
    <radialGradient id="as-mist-l" cx="20%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#5a2880" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#262425" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="as-mist-r" cx="80%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#3a1a60" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#262425" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="as-glow-c" cx="50%" cy="42%" r="35%">
      <stop offset="0%"   stop-color="#8c9657" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#262425" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#as-mist-l)"/>
  <rect width="1200" height="630" fill="url(#as-mist-r)"/>
  <rect width="1200" height="630" fill="url(#as-glow-c)"/>

  <!-- Arcane ring (background, large) -->
  <circle cx="600" cy="285" r="240" fill="none" stroke="#8c9657" stroke-width="1" opacity="0.1"/>
  <circle cx="600" cy="285" r="200" fill="none" stroke="#8c9657" stroke-width="0.5" opacity="0.07"/>

  <!-- Cardinal tick marks on large ring -->
  <line x1="600" y1="45"  x2="600" y2="62"  stroke="#8c9657" stroke-width="2" opacity="0.14"/>
  <line x1="840" y1="285" x2="823" y2="285" stroke="#8c9657" stroke-width="2" opacity="0.14"/>
  <line x1="600" y1="525" x2="600" y2="508" stroke="#8c9657" stroke-width="2" opacity="0.14"/>
  <line x1="360" y1="285" x2="377" y2="285" stroke="#8c9657" stroke-width="2" opacity="0.14"/>

  <!-- Stars -->
  <circle cx="160"  cy="120" r="2.5" fill="#8c9657" opacity="0.5"/>
  <circle cx="300"  cy="80"  r="1.5" fill="#8c9657" opacity="0.4"/>
  <circle cx="440"  cy="150" r="2"   fill="#8c9657" opacity="0.45"/>
  <circle cx="760"  cy="90"  r="2"   fill="#8c9657" opacity="0.45"/>
  <circle cx="900"  cy="140" r="1.5" fill="#8c9657" opacity="0.4"/>
  <circle cx="1040" cy="110" r="2.5" fill="#8c9657" opacity="0.5"/>
  <circle cx="200"  cy="400" r="1.5" fill="#8c9657" opacity="0.3"/>
  <circle cx="980"  cy="420" r="1.5" fill="#8c9657" opacity="0.3"/>
  <circle cx="500"  cy="500" r="1"   fill="#8c9657" opacity="0.25"/>
  <circle cx="700"  cy="480" r="1"   fill="#8c9657" opacity="0.25"/>

  <!-- Quill icon centered -->
  <circle cx="600" cy="185" r="55" fill="none" stroke="#8c9657" stroke-width="1.5" opacity="0.35"/>
  <line x1="600" y1="130" x2="600" y2="138" stroke="#8c9657" stroke-width="2" opacity="0.45"/>
  <line x1="655" y1="185" x2="647" y2="185" stroke="#8c9657" stroke-width="2" opacity="0.45"/>
  <line x1="600" y1="240" x2="600" y2="232" stroke="#8c9657" stroke-width="2" opacity="0.45"/>
  <line x1="545" y1="185" x2="553" y2="185" stroke="#8c9657" stroke-width="2" opacity="0.45"/>
  <path d="M632 143 C642 153 628 178 611 196 C602 205 592 213 588 220"
        fill="none" stroke="#8c9657" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M630 150 C622 153 617 162 615 172" fill="none" stroke="#8c9657" stroke-width="2.2" opacity="0.5"/>
  <path d="M628 158 C620 161 615 170 613 180" fill="none" stroke="#8c9657" stroke-width="2.2" opacity="0.44"/>
  <path d="M630 150 C634 158 630 166 622 173" fill="none" stroke="#8c9657" stroke-width="2.2" opacity="0.44"/>
  <circle cx="588" cy="220" r="7"   fill="#a87a3a"/>
  <circle cx="588" cy="220" r="3.5" fill="#c8922e"/>

  <!-- Horizontal rules -->
  <line x1="160" y1="272" x2="1040" y2="272" stroke="#8c9657" stroke-width="0.8" opacity="0.22"/>

  <!-- Main title -->
  <text x="600" y="352" text-anchor="middle"
        font-family="Cinzel, Palatino Linotype, Georgia, serif"
        font-size="76" font-weight="700" fill="#f0e5d9" letter-spacing="8">AETHERSCRIBE</text>

  <line x1="160" y1="374" x2="1040" y2="374" stroke="#8c9657" stroke-width="0.8" opacity="0.22"/>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle"
        font-family="Barlow Condensed, Arial Narrow, sans-serif"
        font-size="24" font-weight="400" fill="#a87a3a" letter-spacing="10" opacity="0.88">INSCRIBE INFINITY</text>

  <!-- Sub-tagline -->
  <text x="600" y="466" text-anchor="middle"
        font-family="Barlow Condensed, Arial Narrow, sans-serif"
        font-size="14" font-weight="400" fill="#8c9657" letter-spacing="4" opacity="0.55">WORLDBUILDING · CAMPAIGN MANAGEMENT · TTRPG CONTENT CREATION</text>

  <!-- Footer identifier -->
  <text x="600" y="574" text-anchor="middle"
        font-family="Share Tech Mono, Courier New, monospace"
        font-size="12" fill="#8c9657" letter-spacing="2" opacity="0.4">aetherscribe.realms-and-beyond.com</text>
</svg>
