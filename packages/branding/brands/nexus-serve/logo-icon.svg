<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="4" fill="#0f1a24"/>

  <!-- Central hexagon -->
  <polygon points="32,12 45,20 45,36 32,44 19,36 19,20"
           fill="#2a7abf" fill-opacity="0.14" stroke="#2a7abf" stroke-width="2.5"/>

  <!-- Pulse ring -->
  <polygon points="32,6 51,17 51,39 32,50 13,39 13,17"
           fill="none" stroke="#2a7abf" stroke-width="0.8" opacity="0.2"/>

  <!-- Center node -->
  <circle cx="32" cy="28" r="5" fill="#2a7abf"/>
  <circle cx="32" cy="28" r="2.5" fill="#5aafdf"/>

  <!-- Connection lines (vertex to satellite) -->
  <line x1="32" y1="12" x2="32" y2="6"   stroke="#4abfab" stroke-width="1.8"/>
  <line x1="45" y1="20" x2="51" y2="16"  stroke="#4abfab" stroke-width="1.8"/>
  <line x1="45" y1="36" x2="51" y2="40"  stroke="#4abfab" stroke-width="1.8"/>
  <line x1="32" y1="44" x2="32" y2="50"  stroke="#4abfab" stroke-width="1.8"/>
  <line x1="19" y1="36" x2="13" y2="40"  stroke="#4abfab" stroke-width="1.8"/>
  <line x1="19" y1="20" x2="13" y2="16"  stroke="#4abfab" stroke-width="1.8"/>

  <!-- Satellite nodes -->
  <circle cx="32" cy="5"   r="3" fill="#4abfab"/>
  <circle cx="52" cy="15"  r="3" fill="#4abfab"/>
  <circle cx="52" cy="41"  r="3" fill="#4abfab"/>
  <circle cx="32" cy="51"  r="3" fill="#4abfab"/>
  <circle cx="12" cy="41"  r="3" fill="#4abfab"/>
  <circle cx="12" cy="15"  r="3" fill="#4abfab"/>
</svg>
