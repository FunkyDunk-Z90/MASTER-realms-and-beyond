  <text x="88" y="78" font-family="Barlow Condensed, Arial Narrow, sans-serif"
        font-size="9" font-weight="400" fill="#8c9657" letter-spacing="3.5" opacity="0.75">WHERE IDEAS BECOME WORLDS</text>
