  <rect x="46" y="32" width="6" height="22" fill="#a87a3a"/>
  <path d="M14 32 Q33 12 52 32" fill="none" stroke="#a87a3a" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="24" cy="40" r="1.5" fill="#8c9657" opacity="0.9"/>
  <circle cx="33" cy="33" r="1.8" fill="#8c9657" opacity="0.9"/>
  <circle cx="42" cy="40" r="1.5" fill="#8c9657" opacity="0.9"/>
  <circle cx="28" cy="47" r="1"   fill="#8c9657" opacity="0.6"/>
  <circle cx="38" cy="47" r="1"   fill="#8c9657" opacity="0.6"/>
  <line x1="12" y1="54" x2="54" y2="54" stroke="#a87a3a" stroke-width="1" opacity="0.3"/>

